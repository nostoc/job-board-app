apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: cors-plugin
  namespace: default
plugin: cors
config:
  origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
    - "http://localhost:8080"
  methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  headers:
    - Content-Type
    - Authorization
    - Accept
  exposed_headers:
    - Content-Type
    - X-Total-Count
  credentials: true
  max_age: 3600
