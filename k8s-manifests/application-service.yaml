apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-service-deployment
  labels:
    app: application-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: application-service
  template:
    metadata:
      labels:
        app: application-service
    spec:
      containers:
      - name: application-service
        image: hashicorp/http-echo:latest
        args:
          - "-text=Hello from the Application Service (Saga Orchestrator)!"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: application-service
spec:
  selector:
    app: application-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5678
  type: ClusterIP