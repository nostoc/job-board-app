name: Build and Push Services

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate version tag
        id: version
        run: |
          # CalVer format: YYYY.MM.DD.RUN_NUMBER
          VERSION=$(date -u +%Y.%m.%d).${{ github.run_number }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Get changed services
        id: set-matrix
        run: |
          echo "Detecting changed services..."

          # Handle initial commit edge case (no parent)
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          else
            # First commit: treat all tracked files as changed
            CHANGED_FILES=$(git ls-tree --name-only -r HEAD)
          fi

          SERVICES=$(echo "$CHANGED_FILES" | grep '^services/' | cut -d/ -f2 | sort -u)

          if [ -z "$SERVICES" ]; then
            echo "No services changed"
            echo 'services=[]' >> $GITHUB_OUTPUT
          else
            JSON=$(printf '%s\n' $SERVICES | jq -R . | jq -s -c .)
            echo "services=$JSON" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build & Push
    needs: detect-changes
    runs-on: ubuntu-latest

    if: needs.detect-changes.outputs.services != '[]'

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Image
        run: |
          SERVICE=${{ matrix.service }}
          IMAGE=${{ secrets.DOCKER_USERNAME }}/${SERVICE}
          VERSION=${{ needs.detect-changes.outputs.version }}
          SHORT_SHA=${{ github.sha }}
          SHORT_SHA=${SHORT_SHA:0:7}

          echo "Building $SERVICE..."
          echo "Version tag: $VERSION"
          echo "Commit SHA: $SHORT_SHA"

          docker build \
            -t $IMAGE:$VERSION \
            -t $IMAGE:$SHORT_SHA \
            -t $IMAGE:latest \
            --label "version=$VERSION" \
            --label "commit=${{ github.sha }}" \
            --label "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            ./services/$SERVICE

          echo "Pushing $SERVICE..."
          docker push $IMAGE:$VERSION
          docker push $IMAGE:$SHORT_SHA
          docker push $IMAGE:latest

      - name: Output image info
        run: |
          VERSION=${{ needs.detect-changes.outputs.version }}
          SHORT_SHA=${{ github.sha }}
          SHORT_SHA=${SHORT_SHA:0:7}
          echo "✅ Built image: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:$VERSION"
          echo "   Also tagged: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:$SHORT_SHA"
          echo "   Latest tag: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest"