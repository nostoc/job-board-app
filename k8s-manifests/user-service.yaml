apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-deployment
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "8200"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "user-role"
        vault.hashicorp.com/agent-inject-secret-database: "secret/data/user-service"
        vault.hashicorp.com/agent-inject-template-database: |
          {{- with secret "secret/data/user-service" -}}
          {{ .Data.data.DATABASE_URL }}
          {{- end }}
    spec:
      serviceAccountName: user-service-sa
      containers:
      - name: user-service
        image: hashicorp/http-echo:latest
        args:
          - "-text=Hello from the User Service!"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5678
  type: ClusterIP