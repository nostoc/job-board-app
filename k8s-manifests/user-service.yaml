apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-deployment
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "8200"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "user-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/user-service"
        vault.hashicorp.com/agent-inject-secret-zitadel-key.json: "secret/data/user-service"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/user-service" -}}
          export PORT="{{ .Data.data.PORT }}"
          export ZITADEL_DOMAIN="{{ .Data.data.ZITADEL_DOMAIN }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-template-zitadel-key.json: |
          {{- with secret "secret/data/user-service" -}}
          {{ .Data.data.ZITADEL_KEY_JSON }}
          {{- end }}
    spec:
      serviceAccountName: user-service-sa
      containers:
      - name: user-service
        image: chamudithak/user-service:2026.04.26.14
        command: ["/bin/sh", "-c"]
        args:
          - . /vault/secrets/config && DOMAIN="${ZITADEL_DOMAIN#https://}" && DOMAIN="${DOMAIN#http://}" && DOMAIN="${DOMAIN#https//}" && DOMAIN="${DOMAIN#http//}" && exec ./user-service -domain "$DOMAIN" -key "/vault/secrets/zitadel-key.json" -port "${PORT:-8089}"
        ports:
        - containerPort: 8080
        startupProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 30
          periodSeconds: 3
          timeoutSeconds: 2
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP