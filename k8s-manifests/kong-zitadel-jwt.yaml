# Update placeholders before applying this file.
# This config validates Zitadel-issued JWTs at Kong gateway.
apiVersion: v1
kind: Secret
metadata:
  name: zitadel-jwt-credential
  namespace: default
stringData:
  kongCredType: jwt
  key: "https://REPLACE_WITH_ZITADEL_ISSUER_URL"
  algorithm: RS256
  rsa_public_key: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_ZITADEL_RS256_PUBLIC_KEY
    -----END PUBLIC KEY-----
---
apiVersion: configuration.konghq.com/v1
kind: KongConsumer
metadata:
  name: zitadel-issuer
  namespace: default
username: zitadel-issuer
credentials:
  - zitadel-jwt-credential
---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: zitadel-jwt
  namespace: default
plugin: jwt
config:
  claims_to_verify:
    - exp
  key_claim_name: iss
  secret_is_base64: false
