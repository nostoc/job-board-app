apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobs-service-deployment
  labels:
    app: jobs-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobs-service
  template:
    metadata:
      labels:
        app: jobs-service
    spec:
      containers:
      - name: jobs-service
        image: hashicorp/http-echo:latest
        args:
          - "-text=Hello from the Jobs Service!"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: jobs-service
spec:
  selector:
    app: jobs-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5678
  type: ClusterIP