name: Build and Push Services

on:
  push:
    branches:
      - develop

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed services
        id: set-matrix
        run: |
          echo "Detecting changed services..."

          # Handle initial commit edge case (no parent)
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          else
            # First commit: treat all tracked files as changed
            CHANGED_FILES=$(git ls-tree --name-only -r HEAD)
          fi

          SERVICES=$(echo "$CHANGED_FILES" | grep '^services/' | cut -d/ -f2 | sort -u)

          if [ -z "$SERVICES" ]; then
            echo "No services changed"
            echo 'services=[]' >> $GITHUB_OUTPUT
          else
            JSON=$(printf '%s\n' $SERVICES | jq -R . | jq -s -c .)
            echo "services=$JSON" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build & Push
    needs: detect-changes
    runs-on: ubuntu-latest

    if: needs.detect-changes.outputs.services != '[]'

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Image
        run: |
          SERVICE=${{ matrix.service }}
          IMAGE=${{ secrets.DOCKER_USERNAME }}/${SERVICE}

          echo "Building $SERVICE..."

          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            ./services/$SERVICE

          echo "Pushing $SERVICE..."

          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Output image info
        run: |
          echo "Built image: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}"