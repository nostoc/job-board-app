apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-service-deployment
  labels:
    app: application-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: application-service
  template:
    metadata:
      labels:
        app: application-service
        app.kubernetes.io/name: application-service
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "8200"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "application-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/application-service"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/application-service" -}}
          export DATABASE_URL="{{ .Data.data.DATABASE_URL }}"
          export JOBS_SERVICE_URL="{{ .Data.data.JOBS_SERVICE_URL }}"
          export PAYMENT_SERVICE_URL="{{ .Data.data.PAYMENT_SERVICE_URL }}"
          {{- end }}
    spec:
      serviceAccountName: application-service-sa
      containers:
      - name: application-service
        image: chamudithak/application-service:2026.04.28.23
        command: ["/bin/sh", "-c"]
        args:
          - . /vault/secrets/config && until node index.js; do echo "application-service startup failed, retrying in 5s"; sleep 5; done
        env:
        - name: PORT
          value: "3003"
        ports:
        - containerPort: 3003
        startupProbe:
          tcpSocket:
            port: 3003
          failureThreshold: 30
          periodSeconds: 3
          timeoutSeconds: 2
        readinessProbe:
          tcpSocket:
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: application-service
spec:
  selector:
    app: application-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3003
  type: ClusterIP