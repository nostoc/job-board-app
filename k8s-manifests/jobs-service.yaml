apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobs-service-deployment
  labels:
    app: jobs-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobs-service
  template:
    metadata:
      labels:
        app: jobs-service
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "8200"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "jobs-role"
        vault.hashicorp.com/agent-inject-secret-database: "secret/data/jobs-service"
        vault.hashicorp.com/agent-inject-secret-redis: "secret/data/jobs-service"
        vault.hashicorp.com/agent-inject-template-database: |
          {{- with secret "secret/data/jobs-service" -}}
          {{ .Data.data.DATABASE_URL }}
          {{- end }}
        vault.hashicorp.com/agent-inject-template-redis: |
          {{- with secret "secret/data/jobs-service" -}}
          {{ .Data.data.REDIS_URL }}
          {{- end }}
    spec:
      serviceAccountName: jobs-service-sa
      containers:
      - name: jobs-service
        image: chamudithak/jobs-service:2026.04.26.14
        imagePullPolicy: IfNotPresent
        env:
        - name: PORT
          value: "5678"
        - name: NODE_ENV
          value: "development"
        ports:
        - containerPort: 5678
        startupProbe:
          httpGet:
            path: /health
            port: 5678
          failureThreshold: 30
          periodSeconds: 3
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: /health
            port: 5678
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: jobs-service
spec:
  selector:
    app: jobs-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5678
  type: ClusterIP